<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal de notícias</title>
    <link rel="stylesheet" href="./styles/index.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="container">
      <nav id="primary" class="grid grid-flow-col">
        <div>
          <img src="./assets/icons/List.svg" />
          <strong>Menu</strong>
        </div>

        <div>
          <img src="./assets/Logo.svg" alt="Tech logo" />
        </div>

        <div>
          <strong>Buscar</strong>
          <img src="./assets/icons/MagnifyingGlass.svg" alt="" />
        </div>
      </nav>

      <nav id="secondary" class="grid grid-flow-col">
        <a href="#">Cidade Futura</a>
        <a href="#">Blockchain</a>
        <a href="#">Internet das Coisas</a>
        <a href="#">Realidade Virtual</a>
        <a href="#">Robótica</a>
        <a href="#">Cybersecurity</a>
        <a href="#">Data Science</a>
      </nav>
    </header>
    <main class="grid container">
      <section id="featured" class="grid grid-flow-col gap-16">
        <div class="card">
          <img src="./assets/imagens/1_cidade.jpg" alt="cidade" />
          <figcaption>
            <span class="content-tag">Cidade inteligente</span>
            <h2 class="text-2xl">Cidade estruturada, organizada e limpa.</h2>
          </figcaption>
        </div>

        <div class="grid grid-cols-2 gap-16">
          <figure class="card">
            <img src="./assets/imagens/2_combustivel.jpg" alt="combustível" />
            <figcaption>
              <span class="content-tag"> Posto de combustiveis </span>
              <h2 class="text-lg">
                Postos de combustiveis serão substituídos por eletropostos?
              </h2>
            </figcaption>
          </figure>

          <figure class="card">
            <img src="./assets/imagens/3_justica.jpg" alt="justiça" />
            <figcaption>
              <span class="content-tag">Justiça</span>
              <h2 class="text-lg">
                O ministro Flávio Dino do (STF), determinou o bloqueio de R$ 6 milhões do ex-deputado federal Eduardo Cunha, por suspeita de desvio de emendas parlamentares.
              </h2>
            </figcaption>
          </figure>

          <figure class="card">
            <img src="./assets/imagens/4_trabalho.jpg" alt="trabalho" />
            <figcaption>
              <span class="content-tag">Trabalho</span>
              <h2 class="text-lg">
                A PEC que estabelece a jornada de 5 dias de trabalho por 2 de descanso e reduz o limite para 40 horas semanais ainda não foi aprovada.
              </h2>
            </figcaption>
          </figure>

          <figure class="card">
            <img src="./assets/imagens/5_vacina.jpg" alt="posto de saúde" />
            <figcaption>
              <span class="content-tag">Posto de Saúde</span>
              <h2 class="text-lg">
                Vacina contra o virus da H1N1 já está disponível.
              </h2>
            </figcaption>
          </figure>
        </div>
      </section>
    </main>
  </body>
</html>
